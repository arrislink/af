name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  release:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build macOS
        env:
          GOOS: darwin
          GOARCH: amd64
        run: go build -o af-darwin-amd64 ./cmd/af

      - name: Build Linux
        env:
          GOOS: linux
          GOARCH: amd64
        run: go build -o af-linux-amd64 ./cmd/af

      - name: Build macOS ARM64
        env:
          GOOS: darwin
          GOARCH: arm64
        run: go build -o af-darwin-arm64 ./cmd/af

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: af-darwin-amd64 af-linux-amd64 af-darwin-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
